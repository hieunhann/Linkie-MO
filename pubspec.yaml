name: linkie_mo
description: "Linkie Attendee Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  signalr_netcore: ^1.3.7
  camera: ^0.11.0+2
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  permission_handler: ^11.3.1
  jwt_decoder: ^2.0.1
  image_gallery_saver_plus: ^4.0.1
  share_plus: ^10.1.2
  intl: ^0.19.0
  google_sign_in: '>=6.0.0 <7.0.0'
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
