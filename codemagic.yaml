workflows:
  android-free-workflow:
    name: Linkie-MO Android Build (Free)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - signing_credentials 
      flutter: stable
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Set up keystore
        script: |
          # Decode keystore từ env var (nếu có)
          if [ -n "$CM_KEYSTORE" ]; then
            echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/upload-keystore.jks
            export CM_KEYSTORE_PATH=$CM_BUILD_DIR/android/app/upload-keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "Warning: CM_KEYSTORE not set, will use debug signing"
          fi
      - name: Get dependencies
        script: flutter pub get
      - name: Build Android APK (File cài đặt trực tiếp)
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            export CM_KEYSTORE_PATH=$CM_BUILD_DIR/android/app/upload-keystore.jks
          fi
          flutter build apk --release --build-name=1.0.$BUILD_NUMBER --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - tahieunhann@gmail.com

  ios-free-workflow:
    name: Linkie-MO iOS Unsigned Build (Free for Students)
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build iOS (No Codesign)
        script: |
          flutter build ios --release --no-codesign --build-name=1.0.$BUILD_NUMBER --build-number=$BUILD_NUMBER
      - name: Package Unsigned IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Runner.ipa Payload
    artifacts:
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - tahieunhann@gmail.com
